server {
    listen 80;
    server_name vt-autoboat-telemetry.uk www.vt-autoboat-telemetry.uk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name vt-autoboat-telemetry.uk www.vt-autoboat-telemetry.uk;

    ssl_certificate /etc/letsencrypt/live/vt-autoboat-telemetry.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vt-autoboat-telemetry.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
