name: Publish telemetry-server image

env:
  DOCKERHUB_REPO: vtautoboat/telemetry_server
  SOURCE_REF_NAME: ${{ github.event.workflow_run.head_branch }}

on:
  workflow_run:
    workflows: ["Build telemetry-server image"]
    types: [completed]

jobs:
  publish:
    name: Publish Multi-Arch Manifest
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository owner
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Combine the per-arch images into a single multi-arch manifest for each
      # tag. `docker compose pull` resolves the multi-arch manifest and picks
      # the right arch at pull time.
      #
      # GHCR gets the manifest assembled from its own -amd64/-arm64 images.
      # Docker Hub gets the finished manifest mirrored from GHCR via
      # `imagetools create -t <dh> <ghcr>`, which copies the manifest and all
      # arch blobs across registries in one step — so Docker Hub never holds
      # intermediate -arch tags.
      # -----------------------------------------------------------------------
      - name: Create and Push Multi-Arch Manifests
        run: |
          OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}
          GHCR_REPO="ghcr.io/${OWNER_LC}/telemetry_server"
          DOCKER_HUB_REPO="${{ env.DOCKERHUB_REPO }}"

          # Compute base tags (same logic as the build job, WITHOUT the -arch suffix)
          tags="$(sh .github/scripts/compute-release-tags.sh base)"

          for tag in $tags; do
            echo "==> Assembling multi-arch manifest on GHCR: ${GHCR_REPO}:${tag}"
            docker buildx imagetools create -t ${GHCR_REPO}:${tag} \
              ${GHCR_REPO}:${tag}-amd64 \
              ${GHCR_REPO}:${tag}-arm64

            echo "==> Mirroring manifest to Docker Hub: ${DOCKER_HUB_REPO}:${tag}"
            docker buildx imagetools create -t ${DOCKER_HUB_REPO}:${tag} \
              ${GHCR_REPO}:${tag}
          done

          # -----------------------------------------------------------------
          # Custom tailscale image (with OAuth creds baked in). GHCR only --
          # NOT mirrored to Docker Hub, because the image is PRIVATE (it
          # contains a secret) and Docker Hub doesn't get the private
          # treatment. Hosts must `docker login ghcr.io` to pull this.
          # -----------------------------------------------------------------
          TS_GHCR_REPO="ghcr.io/${OWNER_LC}/telemetry_server-tailscale"

          for tag in $tags; do
            echo "==> Assembling multi-arch manifest on GHCR: ${TS_GHCR_REPO}:${tag}"
            docker buildx imagetools create -t ${TS_GHCR_REPO}:${tag} \
              ${TS_GHCR_REPO}:${tag}-amd64 \
              ${TS_GHCR_REPO}:${tag}-arm64
          done
