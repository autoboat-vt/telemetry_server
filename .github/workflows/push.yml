name: Publish telemetry-server image

env:
  DOCKERHUB_REPO: vtautoboat/telemetry_server
  SOURCE_REF_NAME: ${{ github.event.workflow_run.head_branch }}

on:
  workflow_run:
    workflows: ["Build telemetry-server image"]
    types: [completed]

jobs:
  publish:
    name: Publish Multi-Arch Manifest
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository owner
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Combine the per-arch images into a single multi-arch manifest for each
      # tag. `docker compose pull` resolves the multi-arch manifest and picks
      # the right arch at pull time.
      #
      # GHCR gets the manifest assembled from its own -amd64/-arm64 images.
      # Docker Hub gets the finished manifest mirrored from GHCR via
      # `imagetools create -t <dh> <ghcr>`, which copies the manifest and all
      # arch blobs across registries in one step — so Docker Hub never holds
      # intermediate -arch tags.
      # -----------------------------------------------------------------------
      - name: Create and Push Multi-Arch Manifests
        run: |
          OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}
          GHCR_REPO="ghcr.io/${OWNER_LC}/telemetry_server"
          DOCKER_HUB_REPO="${{ env.DOCKERHUB_REPO }}"

          # Compute base tags (same logic as the build job, WITHOUT the -arch suffix)
          tags="$(sh .github/scripts/compute-release-tags.sh base)"

          for tag in $tags; do
            echo "==> Assembling multi-arch manifest on GHCR: ${GHCR_REPO}:${tag}"
            docker buildx imagetools create -t ${GHCR_REPO}:${tag} \
              ${GHCR_REPO}:${tag}-amd64 \
              ${GHCR_REPO}:${tag}-arm64

            echo "==> Mirroring manifest to Docker Hub: ${DOCKER_HUB_REPO}:${tag}"
            docker buildx imagetools create -t ${DOCKER_HUB_REPO}:${tag} \
              ${GHCR_REPO}:${tag}
          done

      # -----------------------------------------------------------------------
      # Clean up intermediate per-arch tags on GHCR.
      #
      # The build job pushes :tag-amd64 and :tag-arm64 versions to GHCR; the
      # manifest step assembles them into a multi-arch :tag. The per-arch
      # versions are then orphans (overwritten by name each build, so only
      # untagged versions actually pile up). This step deletes any package
      # version whose tags are ALL -amd64/-arm64 suffixed, plus untagged
      # versions, keeping GHCR tidy.
      #
      # Requires a PAT stored as GHCR_DELETE_TOKEN with delete:packages scope
      # so the cleanup step can delete package versions.
      #
      # continue-on-error: true so a transient API failure doesn't fail the
      # whole publish job — orphan cleanup is best-effort.
      #
      # Docker Hub stays clean automatically: only final multi-arch manifests
      # are mirrored there (no per-arch tags are ever pushed to Docker Hub).
      # -----------------------------------------------------------------------
      - name: Clean up intermediate per-arch tags (GHCR only)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GHCR_DELETE_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "==> GHCR_DELETE_TOKEN is not set; skipping GHCR cleanup"
            exit 0
          fi

          OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PACKAGE_NAME="${REPO_NAME,,}"
          page=1
          max_pages=200
          while :; do
            if [ "$page" -gt "$max_pages" ]; then
              echo "==> Reached max page ${max_pages}; aborting GHCR cleanup"
              break
            fi
            tmpfile=$(mktemp)
            http_status=$(curl -sS -o "$tmpfile" -w '%{http_code}' \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/orgs/${OWNER_LC}/packages/container/${PACKAGE_NAME}/versions?per_page=100&page=${page}") || {
              echo "==> curl failed; aborting GHCR cleanup"
              rm -f "$tmpfile"
              break
            }
            resp=$(cat "$tmpfile")
            rm -f "$tmpfile"
            echo "==> GHCR API HTTP status: ${http_status}"
            if ! printf '%s' "$http_status" | grep -E '^[0-9]+$' >/dev/null 2>&1; then
              echo "==> Invalid HTTP status value; aborting GHCR cleanup"
              break
            fi
            if [ "$http_status" -ne 200 ]; then
              echo "==> Non-200 HTTP status; aborting GHCR cleanup"
              break
            fi
            if [ -z "$resp" ] || [ "$resp" = "[]" ]; then break; fi
            # Ensure response is a JSON array; abort on unexpected responses (HTML, error JSON, etc.)
            if ! echo "$resp" | jq -e 'if type=="array" then . else empty end' >/dev/null 2>&1; then
              echo "==> Unexpected API response; aborting GHCR cleanup"
              break
            fi
            per_page=100
            items=$(echo "$resp" | jq 'length')
            # Read entries into an array to avoid subshells so we can detect untagged deletions per page
            mapfile -t entries < <(echo "$resp" | jq -r '.[] | "\(.id)\t\(.metadata.container.tags | join(","))"')
            found_untagged_in_page=0
            for entry in "${entries[@]}"; do
              IFS=$'\t' read -r id tags_str <<< "$entry"
              if [ -z "$tags_str" ]; then
                echo "==> Deleting untagged GHCR package version ${id}"
                curl -fsS -X DELETE \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/orgs/${OWNER_LC}/packages/container/${PACKAGE_NAME}/versions/${id}" \
                  || echo "  (failed to delete version ${id}, continuing)"
                found_untagged_in_page=$((found_untagged_in_page + 1))
              else
                echo "==> Keeping GHCR package version ${id} (tags: ${tags_str})"
              fi
            done
            # If this page had no untagged versions and it's the last page (items < per_page),
            # then no untagged versions remain and we can stop early.
            if [ "$found_untagged_in_page" -eq 0 ] && [ "$items" -lt "$per_page" ]; then
              echo "==> No untagged versions remain; stopping cleanup"
              break
            fi
            page=$((page + 1))
          done
