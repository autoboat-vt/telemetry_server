# Build the telemetry-server Docker image and push it to both GitHub Container
# Registry (GHCR) and Docker Hub. The resulting image is multi-arch
# (amd64 + arm64) so it runs on both x86 VMs (AWS, GCP) and ARM instances
# (Oracle Ampere, Graviton).
#
# Trigger:
#   - On every push to main (builds and tags :main)
#   - On version tags v* (builds and tags :vX.Y.Z + :latest)
#   - Manually via the "Run workflow" button in the Actions tab
#
# Both registries host a public image, so the install script can
# `docker compose pull` from either without authentication.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   - DOCKERHUB_USERNAME : Docker Hub username (must own the vtautoboat namespace)
#   - DOCKERHUB_TOKEN    : Personal access token from Docker Hub
#                         (https://hub.docker.com/settings/security)

name: Build and Push Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  # Docker Hub namespace (matches the org's existing Docker Hub account)
  DOCKERHUB_REPO: vtautoboat/telemetry_server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository owner
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only push images to the registry when pushing to the main branch.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        # Only push images to the registry when pushing to the main branch.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Both registries get the same set of tags
          images: |
            ghcr.io/${{ env.OWNER_LC }}/telemetry_server
            ${{ env.DOCKERHUB_REPO }}
          tags: |
            # On main branch pushes -> tag :main
            type=ref,event=branch
            # On v* tags -> tag :v1.2.3 and :latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache between runs to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
