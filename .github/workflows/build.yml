# Build the telemetry-server Docker image on pushes and pull requests without
# publishing images. This keeps validation in one place while the release
# workflow in push.yml handles publishing to GHCR and Docker Hub.

name: Build telemetry-server image

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main, testing]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        architecture: [amd64, arm64]
        include:
          - architecture: amd64
            runner: ubuntu-22.04
            platform: linux/amd64
          - architecture: arm64
            runner: ubuntu-22.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=${{ matrix.architecture }}
          cache-to: type=gha,mode=max,scope=${{ matrix.architecture }}
