# Build the telemetry-server Docker image on pushes and pull requests without
# publishing images. This keeps validation in one place while the release
# workflow in push.yml handles publishing to GHCR and Docker Hub.

name: Build telemetry-server image

on:
  push:
    branches: [main, testing]
    tags: ["v*"]
  pull_request:
    branches: [main, testing]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        architecture: [amd64, arm64]
        include:
          - architecture: amd64
            runner: ubuntu-22.04
            platform: linux/amd64
          - architecture: arm64
            runner: ubuntu-22.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        if: github.event_name == 'push'
        id: meta
        run: |
          OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}
          GHCR_REPO="ghcr.io/${OWNER_LC}/telemetry_server"

          tags="$(SOURCE_REF_NAME=${GITHUB_REF_NAME} sh .github/scripts/compute-release-tags.sh base)"

          refs=""
          for t in $tags; do
            refs="${refs}${GHCR_REPO}:${t}-${{ matrix.architecture }}\n"
          done
          {
            echo "tags<<EOF"
            printf "%b" "$refs"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.architecture }}
          cache-to: type=gha,mode=max,scope=${{ matrix.architecture }}
