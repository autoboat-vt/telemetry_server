services:
    app:
        build:
            context: .
            dockerfile: server_files/Dockerfile
        container_name: telemetry-server-app
        restart: unless-stopped
        expose:
            - "8000"
        volumes:
            - ./src/instance:/home/ubuntu/telemetry_server/src/instance

    nginx:
        image: nginx:1.27-alpine
        container_name: telemetry-server-nginx
        depends_on:
            - app
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./server_files/nginx_docker.conf:/etc/nginx/conf.d/default.conf:ro
            - letsencrypt:/etc/letsencrypt
            - certbot-webroot:/var/www/certbot

    certbot:
        image: certbot/certbot:latest
        container_name: telemetry-server-certbot
        profiles:
            - certbot
        volumes:
            - letsencrypt:/etc/letsencrypt
            - certbot-webroot:/var/www/certbot

volumes:
    letsencrypt:
    certbot-webroot:
