# Docker Compose configuration for the Autoboat telemetry server.
#
# Replaces the original host-based install.sh. Traffic reaches the apps via a Cloudflare
# Tunnel (cloudflared), which dials OUT to Cloudflare's edge — so no inbound
# ports need to be open on the host (works behind NAT, CGNAT, or a firewall).
# Cloudflare terminates TLS at the edge; no nginx or certbot is needed.
#
# Services:
#   - telemetry-prod : gunicorn app on :8000 (production)
#   - telemetry-test  : gunicorn app on :6001 (testing)
#   - cloudflared     : outbound tunnel to Cloudflare, routes hostnames -> apps
#   - cron            : calls /instance_manager/clean_instances every 5 min
#
# Usage:
#   cp .env.example .env   # set TUNNEL_TOKEN (and DOMAIN, TESTING_DOMAIN)
#   docker compose up -d        # pulls prebuilt image from GHCR (fast)
#   docker compose up -d --build  # build locally instead (for development)
#
# The prebuilt image is published by the GitHub Action in
# .github/workflows/push.yml on every push to main. It's multi-arch
# (amd64 + arm64) and public, so `docker compose pull` works without login.
#
# First-time Cloudflare setup (dashboard-managed tunnel, recommended):
#   1. Go to https://one.dash.cloudflare.com/ -> Networks -> Tunnels -> Create
#   2. Create a tunnel; copy the install token into .env as TUNNEL_TOKEN
#   3. Add public hostnames in the dashboard:
#        vt-autoboat-telemetry.uk      -> http://telemetry-prod:8000
#        www.vt-autoboat-telemetry.uk  -> http://telemetry-prod:8000
#        test.vt-autoboat-telemetry.uk -> http://telemetry-test:6001
#   4. In Cloudflare DNS, the tunnel's CNAMEs are added automatically.

services:
  telemetry-prod:
    # Prebuilt image from GitHub Container Registry. Override locally with
    # `docker compose up -d --build` to build from source instead.
    image: ghcr.io/autoboat-vt/telemetry_server:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telemetry-prod
    restart: unless-stopped
    environment:
      PATH: "/home/ubuntu/telemetry_server/venv/bin:/usr/local/bin:/usr/bin:/bin"
      VIRTUAL_ENV: "/home/ubuntu/telemetry_server/venv"
    volumes:
      # Persist the SQLite databases (instances.db, hashes.db) across restarts.
      - prod-instance-data:/home/ubuntu/telemetry_server/src/instance
    expose:
      - "8000"
    networks:
      - telemetry-net

  telemetry-test:
    # Uses the :testing tag, which is built from the `testing` branch by the
    # GitHub Action in .github/workflows/push.yml. This lets us run
    # pre-release code on test.vt-autoboat-telemetry.uk without affecting prod.
    # To build locally instead, run: docker compose up -d --build telemetry-test
    image: ghcr.io/autoboat-vt/telemetry_server:testing
    container_name: telemetry-test
    restart: unless-stopped
    environment:
      PATH: "/home/ubuntu/telemetry_server/venv/bin:/usr/local/bin:/usr/bin:/bin"
      VIRTUAL_ENV: "/home/ubuntu/telemetry_server/venv"
    volumes:
      - test-instance-data:/home/ubuntu/telemetry_server/src/instance
    expose:
      - "6001"
    # The app listens on 8000 inside the container (see Dockerfile CMD).
    # Bind it to 6001 here so cloudflared routes http://telemetry-test:6001.
    command:
      - "/home/ubuntu/telemetry_server/venv/bin/gunicorn"
      - "-w"
      - "1"
      - "--bind"
      - "0.0.0.0:6001"
      - "autoboat_telemetry_server:create_app()"
    networks:
      - telemetry-net

  cloudflared:
    # The cloudflare/cloudflared image is distroless (no shell). Its default
    # ENTRYPOINT is `cloudflared --no-autoupdate`, so we just override CMD.
    # Dashboard-managed mode: pass `tunnel run --token <TUNNEL_TOKEN>`.
    # File-managed mode: see the USE_CONFIG_FILE branch below.
    image: cloudflare/cloudflared:latest
    container_name: telemetry-cloudflared
    restart: unless-stopped
    depends_on:
      - telemetry-prod
      - telemetry-test
    networks:
      - telemetry-net
    command: ${TUNNEL_COMMAND:-tunnel run --token ${TUNNEL_TOKEN:?TUNNEL_TOKEN is required. See .env.example}}

  cron:
    build:
      context: ./docker/cron
      dockerfile: Dockerfile
    # Local-only image (built from docker/cron/Dockerfile).
    # `docker compose pull` skips services with no registry image.
    image: telemetry-cron:latest
    container_name: telemetry-cron
    restart: unless-stopped
    volumes:
      - cron-logs:/var/log
    depends_on:
      - telemetry-prod
    networks:
      - telemetry-net

  tailscale:
    # Optional: joins your Tailscale tailnet so you can SSH into the host from
    # anywhere on your tailnet. Opt in with:
    #   docker compose --profile tailscale up -d
    #
    # The container dials OUT to Tailscale's coordination server (just like
    # cloudflared dials out to Cloudflare), so no inbound ports need to be
    # open on the host. TS_DEST_IP forwards traffic arriving at the Tailscale
    # node to the host via the docker gateway (host.docker.internal), so:
    #   ssh <user>@telemetry-server  ->  host's sshd on port 22
    #
    # Auth: uses an OAuth CLIENT (TS_CLIENT_ID + TS_CLIENT_SECRET), NOT an
    # auth key. Auth keys expire after at most 90 days and there's no way to
    # extend them -- you'd have to regenerate and redeploy every 90 days.
    # OAuth client secrets do NOT expire, so this runs unattended forever.
    # The trade-off: OAuth-registered nodes MUST be tagged (Tailscale
    # requirement), so we pass --advertise-tags=tag:server via TS_EXTRA_ARGS.
    # Create the OAuth client at
    #   https://login.tailscale.com/admin/settings/trust-credentials
    # with BOTH the "Devices - core" (devices:core) AND "Policy File"
    # (policy_file) scopes, and assign the tag:server tag. The same OAuth
    # client is reused by the GitOps ACL workflow in
    # .github/workflows/tailscale.yml.
    #
    # No tagOwners entry needed: Tailscale lets an OAuth client assign a tag
    # if the requested tags EXACTLY MATCH the client's tags (no tagOwners
    # consultation). Since the client has tag:server and we advertise
    # tag:server, it's an exact match. tagOwners is only needed if you want
    # regular users or OTHER tags to be able to assign tag:server.
    #
    # Requires:
    #   - /dev/net/tun on the host (Linux: `modprobe tun` if missing)
    #   - Host sshd listening on 0.0.0.0:22 (default on most distros)
    #
    # The OAuth credentials are BAKED INTO the custom image (built in
    # .github/workflows/build.yml from docker/tailscale/Dockerfile). The
    # upstream tailscale/tailscale image is extended with ENV vars set from
    # build args passed by GitHub Actions (where the org secrets are
    # available). This means NO .env paste is required on the host -- the
    # image is self-contained.
    #
    # SECURITY: this image is PRIVATE on GHCR (it contains the OAuth client
    # secret). Hosts must `docker login ghcr.io` before `docker compose pull`.
    # See docker/README.md and docker/tailscale/Dockerfile for details.
    image: ghcr.io/autoboat-vt/telemetry_server-tailscale:latest
    container_name: telemetry-tailscale
    restart: unless-stopped
    hostname: telemetry-server
    profiles:
      - tailscale
    # Use host networking: the tailscale interface lives on the host directly,
    # so SSH to the tailscale IP routes to the host's sshd without any
    # TS_DEST_IP forwarding, host.docker.internal hackery, or containerboot
    # router setup. This sidesteps the entire "IP forwarding must be enabled"
    # and "TS_DEST_IP is not supported with TS_USERSPACE" error chain.
    network_mode: host
    # The upstream tailscale/tailscale image runs as the non-root `tailscale`
    # user by default. Running as root lets containerboot manage /dev/net/tun
    # and /var/lib/tailscale without permission errors on this GCP host.
    user: "0:0"
    environment:
      # TS_CLIENT_ID and TS_CLIENT_SECRET come from the image (baked in at
      # build time via docker/tailscale/Dockerfile). No host-side .env needed.
      TS_HOSTNAME: telemetry-server
      TS_STATE_DIR: /var/lib/tailscale
      # Kernel mode (not userspace) — host networking requires the kernel
      # tailscaled, and we want the tailnet IP directly on the host.
      TS_USERSPACE: "false"
      # OAuth-registered nodes must be tagged. The OAuth client has tag:server
      # in its tag set, and we advertise tag:server here — that's an exact
      # match, so Tailscale allows the assignment without any tagOwners entry.
      TS_EXTRA_ARGS: --advertise-tags=tag:server
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1

networks:
  telemetry-net:
    driver: bridge

volumes:
  prod-instance-data:
  test-instance-data:
  cloudflared-creds:
  cron-logs:
  tailscale-state:
